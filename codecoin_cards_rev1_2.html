<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CodeCoin — การ์ดทรัพย์สิน 16 ใบ (CARD REV 1.0 PRINT)</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@600;800&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FDF6E3; --dark:#0B2B22; --gold:#FBBF24; --silk:#134E3A;
    --ink:#2C2C2A; --sub:#5F5E5A; --hint:#888780;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:#3a3a38; font-family:'Sarabun',sans-serif; }

  /* ===== toolbar (ไม่พิมพ์) ===== */
  .toolbar{ position:sticky; top:0; z-index:10; background:#1f1f1e; color:#e8e6df;
    padding:10px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; font-size:14px; }
  .toolbar b{ font-family:'Kanit',sans-serif; }
  .toolbar label{ display:flex; gap:6px; align-items:center; cursor:pointer; }
  .toolbar .note{ color:#b8b5aa; font-size:12px; }
  @media print{ .toolbar{ display:none; } body{ background:#fff; } }

  /* ===== แผ่น A4 ===== */
  @page{ size:A4; margin:0; }
  .sheet{ width:210mm; height:297mm; margin:8mm auto; background:#fff;
    display:grid; grid-template-columns:repeat(2,69mm); grid-auto-rows:94mm;
    gap:5mm; justify-content:center; align-content:center;
    page-break-after:always; box-shadow:0 2px 12px rgba(0,0,0,.4); }
  @media print{ .sheet{ margin:0; box-shadow:none; } }
  .sheet-tag{ position:absolute; font-size:8pt; color:#999; font-family:'Sarabun'; }

  /* ===== การ์ด: trim 63×88 มม. + bleed 3 มม. = 69×94 มม. ===== */
  .card{ position:relative; width:69mm; height:94mm; overflow:hidden; }
  .guide{ position:absolute; inset:3mm; border:.25mm dashed #FF00AA; pointer-events:none; z-index:9; display:none; }
  body.guides .guide{ display:block; }
  @media print{ body.guides .guide{ display:block; } }

  /* ---------- แบบที่ 1: คลาสสิก ---------- */
  .c1{ background:var(--cream); }
  .c1 .band{ height:19mm; padding-top:4.5mm; text-align:center; }
  .c1 .zone{ font-family:'Sarabun'; font-weight:700; font-size:6.5pt; letter-spacing:2px; }
  .c1 .name{ font-family:'Kanit',sans-serif; font-weight:800; font-size:11.5pt; color:#fff; line-height:1.15; }
  .c1 .kw{ font-size:6.5pt; }
  .c1 .body{ padding:2.5mm 6mm 0; text-align:center; }
  .qrbox{ width:26mm; height:26mm; margin:1.5mm auto 0; background:#fff;
    border:.4mm solid var(--dark); border-radius:1mm; position:relative;
    display:flex; align-items:center; justify-content:center; }
  .qrbox img{ width:24mm; height:24mm; display:block; }
  .qrbox .ph{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; font-size:6pt; color:#b0aca0; gap:1mm; }
  .qrbox .ph b{ font-family:monospace; font-size:6.5pt; color:#8a8678; }
  .rule1{ margin-top:1.6mm; font-size:6.3pt; color:var(--sub); }
  .rule2{ font-size:6.5pt; font-weight:700; }
  .levels{ display:flex; justify-content:center; gap:6.5mm; margin-top:2.2mm; }
  .lv{ text-align:center; width:12mm; }
  .dot{ width:3.6mm; height:3.6mm; border-radius:50%; margin:0 auto; }
  .dot.o{ background:transparent !important; border:.4mm solid; }
  .lv .ln{ font-size:5.6pt; color:var(--sub); margin-top:.8mm; }
  .lv .lr{ font-size:8pt; font-weight:700; color:var(--ink); }
  .rentcap{ font-size:5.4pt; color:var(--hint); margin-top:.6mm; }
  .c1 .div{ border-top:.25mm solid var(--dark); margin:1.8mm 4mm 0; }
  .price{ font-family:'Kanit',sans-serif; font-weight:800; font-size:11pt; margin-top:1.4mm; }
  .foot{ position:absolute; left:6mm; right:6mm; bottom:4.5mm; display:flex;
    justify-content:space-between; font-size:5.5pt; color:var(--hint); }
  .foot .id{ font-family:monospace; }

  /* ---------- แบบที่ 2: PCB เข้ม ---------- */
  .c2{ background:var(--dark); color:#E2E8F0; }
  .c2 .frame{ position:absolute; inset:5mm; border:.45mm solid var(--gold); border-radius:1.5mm; }
  .c2 .strip{ position:absolute; left:5mm; top:5mm; bottom:5mm; width:1.6mm; }
  .c2 .pins{ position:absolute; top:5mm; left:12mm; right:12mm; height:2mm;
    display:flex; justify-content:space-between; }
  .c2 .pins i{ width:.7mm; height:2mm; background:var(--gold); }
  .c2 .notch{ position:absolute; top:7.5mm; right:8mm; width:2.4mm; height:2.4mm;
    border:.35mm solid var(--gold); border-radius:50%; }
  .c2 svg.tr{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .c2 .inner{ position:relative; z-index:2; padding-top:11mm; text-align:center; }
  .c2 .zone{ font-weight:700; font-size:6.5pt; letter-spacing:2px; }
  .c2 .name{ font-family:'Kanit',sans-serif; font-weight:800; font-size:11.5pt; color:var(--gold); line-height:1.15; }
  .c2 .kw{ font-size:6.5pt; color:#86EFAC; }
  .c2 .qrbox{ border:none; }
  .c2 .rule1{ color:#86EFAC; }
  .c2 .rule2{ color:var(--gold); }
  .c2 .lv .ln{ color:#86EFAC; }
  .c2 .lv .lr{ color:#E2E8F0; }
  .c2 .rentcap{ color:#4B6A5C; }
  .c2 .div{ border-top:.25mm solid var(--gold); margin:1.8mm 10mm 0; }
  .c2 .price{ color:var(--gold); }
  .c2 .foot{ left:8mm; right:8mm; bottom:6.5mm; color:#4B6A5C; }

  body.only-c1 .style-c2{ display:none; }
  body.only-c2 .style-c1{ display:none; }
</style>
</head>

const QR_SRC = id => QR_DATA[id] || `qr_output/${id}.png`;
const fmt = n => n.toLocaleString('en-US');

function qrHTML(id){
  return `<div class="qrbox">
    <span class="ph">วางไฟล์ QR<b>${id}.png</b></span>
    <img src="${QR_SRC(id)}" alt="QR ${id}" onerror="this.style.display='none'"
         onload="this.previousElementSibling.style.display='none'">
  </div>`;
}

function levelsHTML(c, color, txtColor){
  const names = ['เริ่มต้น','ชำนาญ','ผู้เชี่ยวชาญ'];
  return `<div class="levels">` + c.rent.map((r,i)=>`
    <div class="lv">
      <div class="dot ${i? 'o':''}" style="${i? `border-color:${color}`:`background:${color}`}"></div>
      <div class="ln">${names[i]}</div>
      <div class="lr">${r}</div>
    </div>`).join('') + `</div>
    <div class="rentcap">ค่าเช่าต่อครั้ง (TechCoin)</div>`;
}

function card1(c){
  const z = ZONES[c.z];
  return `<div class="card c1 style-c1">
    <div class="band" style="background:${z.brand}">
      <div class="zone" style="color:${z.bandText}">${z.en}</div>
      <div class="name">${c.name}</div>
      <div class="kw" style="color:${z.bandText}">${c.kw}</div>
    </div>
    <div class="body">
      ${qrHTML(c.id)}
      <div class="rule1">สแกน 1 ครั้ง = เนื้อหา 30–60 วิ + คำถาม</div>
      <div class="rule2" style="color:${z.priceOn}">ตอบถูก รับส่วนลด 20%</div>
      ${levelsHTML(c, z.brand)}
      <div class="div"></div>
      <div class="price" style="color:${z.priceOn}">ราคา ${fmt(c.price)} TechCoin</div>
    </div>
    <div class="foot"><span class="id">${c.id}</span><span>CodeCoin</span></div>
    <div class="guide"></div>
  </div>`;
}

function card2(c){
  const z = ZONES[c.z];
  const pins = Array.from({length:8}).map(()=>'<i></i>').join('');
  return `<div class="card c2 style-c2">
    <div class="frame"></div>
    <div class="strip" style="background:${z.trace}"></div>
    <div class="pins">${pins}</div>
    <div class="notch"></div>
    <svg class="tr" viewBox="0 0 69 94" preserveAspectRatio="none">
      <path d="M10,26 H16 V31 H21 M59,26 H52 V32" stroke="#134E3A" stroke-width=".5" fill="none"/>
      <circle cx="21" cy="31" r=".9" fill="#134E3A"/><circle cx="52" cy="32" r=".9" fill="#134E3A"/>
      <path d="M10,84 H18 V80 M59,84 H50 V80" stroke="#134E3A" stroke-width=".5" fill="none"/>
      <circle cx="18" cy="80" r=".9" fill="#134E3A"/><circle cx="50" cy="80" r=".9" fill="#134E3A"/>
    </svg>
    <div class="inner">
      <div class="zone" style="color:${z.trace}">${z.en}</div>
      <div class="name">${c.name}</div>
      <div class="kw">${c.kw}</div>
      ${qrHTML(c.id)}
      <div class="rule1">สแกน 1 ครั้ง = เนื้อหา 30–60 วิ + คำถาม</div>
      <div class="rule2">ตอบถูก รับส่วนลด 20%</div>
      ${levelsHTML(c, z.trace)}
      <div class="div"></div>
      <div class="price">ราคา ${fmt(c.price)} TechCoin</div>
    </div>
    <div class="foot"><span class="id">${c.id}</span><span>PCB EDITION</span></div>
    <div class="guide"></div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  const chunks = (arr,n)=>arr.reduce((a,_,i)=> i%n? a : [...a, arr.slice(i,i+n)], []);
  let html = '';
  chunks(CARDS.map(card1), 6).forEach(g => html += `<div class="sheet style-c1">${g.join('')}</div>`);
  chunks(CARDS.map(card2), 6).forEach(g => html += `<div class="sheet style-c2">${g.join('')}</div>`);
  app.innerHTML = html;
}
render();

document.querySelectorAll('input[name=st]').forEach(r =>
  r.addEventListener('change', e => { document.body.classList.remove('only-c1','only-c2');
    if(e.target.value) document.body.classList.add(e.target.value); }));
document.getElementById('g').addEventListener('change', e =>
  document.body.classList.toggle('guides', e.target.checked));
</script>
</body>
