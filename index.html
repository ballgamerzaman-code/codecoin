<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeCoin — QR System</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --board:#0B2B22;      /* พื้น PCB */
    --panel:#0D3327;      /* กล่องเนื้อหา */
    --line:#1F4A3A;       /* เส้นขอบ */
    --gold:#FBBF24;       /* สีทอง (เหตุการณ์/ปุ่มหลัก) */
    --text:#E2E8F0;
    --muted:#94A3B8;
    --ok:#4ADE80;
    --bad:#F87171;
    /* สีประจำโซน */
    --coding:#4ADE80; --design:#FB923C; --office:#38BDF8; --hardware:#F472B6;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--board); color:var(--text);
    font-family:'Sarabun',sans-serif; min-height:100vh;
    display:flex; justify-content:center; padding:20px 14px 76px; /* เผื่อพื้นที่ล่างให้ปุ่ม mute ไม่บังปุ่มอื่น */
    background-image:
      linear-gradient(#0F4C3A 1px, transparent 1px),
      linear-gradient(90deg, #0F4C3A 1px, transparent 1px);
    background-size:28px 28px;
  }
  .app { width:100%; max-width:430px; }

  /* ---------- ส่วนหัวแบบชิป ---------- */
  header {
    background:#111827; border:2px solid var(--gold); border-radius:14px;
    padding:14px 18px; text-align:center; position:relative; margin-bottom:18px;
  }
  header::before, header::after {
    content:""; position:absolute; top:-8px; left:20%; width:60%; height:8px;
    background:repeating-linear-gradient(90deg, var(--gold) 0 4px, transparent 4px 18px);
  }
  header::after { top:auto; bottom:-8px; }
  header h1 { font-family:'Kanit',sans-serif; font-size:24px; color:var(--gold); letter-spacing:1px; }
  header p { font-size:12px; color:#86EFAC; }

  .zone-tag {
    display:inline-block; font-size:12px; font-weight:700; padding:3px 12px;
    border-radius:20px; margin-bottom:10px; color:#05100C;
  }
  .card {
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:18px 16px; margin-bottom:14px;
  }
  h2 { font-family:'Kanit',sans-serif; font-size:20px; margin-bottom:10px; }
  .content { font-size:14.5px; line-height:1.8; color:#CBD5E1; }
  .price { color:var(--gold); font-weight:700; }

  .q { font-weight:700; font-size:15px; margin:6px 0 12px; }
  .choice {
    display:block; width:100%; text-align:left; background:#0B241B;
    border:1px solid var(--line); border-radius:10px; color:var(--text);
    padding:12px 14px; font-size:14px; font-family:inherit; margin-bottom:9px; cursor:pointer;
  }
  .choice:hover { border-color:var(--gold); }
  .choice.correct { border-color:var(--ok); background:#0F3B2A; }
  .choice.wrong { border-color:var(--bad); background:#3B1414; }

  .timer { text-align:center; font-family:'Kanit',sans-serif; font-size:18px; color:var(--gold); margin-bottom:10px; }
  .timer.danger { color:var(--bad); }

  .result { text-align:center; border-radius:12px; padding:14px; font-size:15px; margin-top:6px; }
  .result.win { background:#0F3B2A; border:1px solid var(--ok); color:var(--ok); }
  .result.lose { background:#3B1414; border:1px solid var(--bad); color:var(--bad); }
  .result.info { background:#14200E; border:1px solid var(--gold); color:#FDE68A; }

  .btn {
    display:block; width:100%; border:none; border-radius:12px; padding:13px;
    font-family:'Kanit',sans-serif; font-size:16px; cursor:pointer; margin-top:10px;
    background:var(--gold); color:#05100C;
  }
  .btn.ghost { background:transparent; border:1px solid var(--gold); color:var(--gold); }

  .code-box {
    background:#05100C; border:1px solid var(--line); border-radius:10px;
    font-family:monospace; font-size:13px; color:#A7F3D0; padding:12px; white-space:pre; overflow-x:auto; margin-bottom:12px;
  }
  .menu-item {
    display:flex; justify-content:space-between; align-items:center;
    background:#0B241B; border:1px solid var(--line); border-radius:10px;
    border-left:4px solid var(--zc, var(--line));
    padding:11px 14px; margin-bottom:8px; cursor:pointer; font-size:14px;
  }
  .menu-item:hover { border-color:var(--gold); border-left-color:var(--zc, var(--gold)); }
  .menu-item small { color:var(--muted); font-size:11px; }
  .menu-zone { margin-top:16px; }
  .menu-zone-head {
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
    font-family:'Kanit',sans-serif; font-size:13.5px; letter-spacing:.5px; color:var(--zc);
  }
  .menu-zone-head::after { content:""; flex:1; height:1px; background:var(--line); }
  .footer-note { text-align:center; font-size:11px; color:#4B6A5C; margin-top:16px; }

  .data-warn {
    background:#3A2A0A; border:1px solid var(--gold); border-radius:10px;
    font-size:12.5px; color:#FDE68A; padding:9px 12px; margin-bottom:14px; text-align:center;
  }
  .upgrade-links { display:flex; gap:8px; }
  .upgrade-links .btn { font-size:14px; padding:10px 6px; }

  /* ---------- ปุ่มเลือกโหมดเดิมพัน (หน้าซื้อทรัพย์สิน) ---------- */
  .bet-row { display:flex; gap:8px; margin-bottom:12px; }
  .bet-btn {
    flex:1; background:#0B241B; border:1px solid var(--line); border-radius:10px;
    color:var(--muted); padding:9px 6px; text-align:center;
    font-family:'Kanit',sans-serif; font-size:14px; cursor:pointer;
  }
  .bet-btn small { display:block; font-family:'Sarabun',sans-serif; font-size:10.5px; margin-top:2px; color:var(--muted); }
  .bet-btn.active { border-color:var(--gold); color:var(--gold); background:#14200E; }
  .bet-btn.active small { color:#FDE68A; }
  .bet-btn:disabled { opacity:.55; cursor:default; }

  /* ---------- กรอบวงล้อสุ่มผลแก้บั๊ก (เลนมั่นใจ+ผิด) ---------- */
  .roulette-frame {
    background:#05100C; border:1px solid var(--line); border-radius:10px;
    padding:13px 12px; margin-top:10px; text-align:center;
    font-family:'Kanit',sans-serif; font-size:15px; color:#A7F3D0;
    animation:roulettePulse .12s ease-out;
  }
  .roulette-frame.final {
    border-color:var(--gold); color:#FDE68A;
    animation:rouletteLand .45s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes roulettePulse { from { transform:scale(.97); opacity:.65; } to { transform:scale(1); opacity:1; } }
  @keyframes rouletteLand  { 0% { transform:scale(.9); } 60% { transform:scale(1.05); } 100% { transform:scale(1); } }

  /* ---------- มินิเกมกู้บั๊กด่วน (Debug Rescue) ---------- */
  .rescue-code {
    font-family:'Kanit',sans-serif; font-size:34px; letter-spacing:8px; color:var(--gold);
    text-align:center; background:#05100C; border:1px solid var(--gold); border-radius:10px;
    padding:12px; margin:10px 0;
  }
  .rescue-input {
    width:100%; text-align:center; text-transform:uppercase; letter-spacing:8px;
    font-family:'Kanit',sans-serif; font-size:26px; background:#05100C; color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:11px; margin-bottom:10px;
  }
  .role-pick { display:flex; gap:8px; }
  .role-pick .btn { margin-top:0; }
  .wire-row {
    display:flex; align-items:center; gap:10px; margin-bottom:9px;
    background:#0B241B; border:1px solid var(--line); border-radius:10px; padding:8px 12px;
  }
  .wire-bar { flex:1; height:16px; border-radius:8px; }
  .wire-idx { font-family:monospace; font-size:12px; color:var(--muted); width:20px; }
  .wire-row.cut { opacity:.4; }
  .wire-row.cut .wire-bar { background:#333 !important; position:relative; }
  .wire-cut-btn {
    background:transparent; border:1px solid var(--bad); color:var(--bad); border-radius:8px;
    font-family:'Kanit',sans-serif; font-size:13px; padding:5px 12px; cursor:pointer;
  }
  .wire-cut-btn:disabled { opacity:.4; cursor:default; }
  .rescue-guide {
    background:#14200E; border:1px solid var(--gold); border-radius:12px;
    padding:16px; font-size:16px; line-height:1.7; color:#FDE68A;
  }

  /* ---------- ปุ่มเลือกผู้ชนะ (event แบบ speed) ---------- */
  .speed-players { display:flex; gap:8px; margin:4px 0 6px; }
  .speed-player {
    flex:1; background:#0B241B; border:1px solid var(--gold); border-radius:10px;
    color:var(--gold); padding:12px 4px; text-align:center; cursor:pointer;
    font-family:'Kanit',sans-serif; font-size:14px;
  }
  .speed-player:hover { background:#14200E; }
  .speed-player:disabled { opacity:.5; cursor:default; }

  /* ---------- ปุ่ม mute ลอยมุมขวาล่าง ---------- */
  .mute-btn {
    position:fixed; right:14px; bottom:14px; z-index:70;
    width:44px; height:44px; border-radius:50%; cursor:pointer;
    background:#111827; border:1.5px solid var(--gold); color:var(--gold);
    font-size:19px; line-height:1; opacity:.92;
  }
  .mute-btn.off { border-color:var(--line); color:var(--muted); }

  /* ---------- เอฟเฟกต์กะพริบเต็มจอ (โปร่งใส ไม่รับคลิก ไม่แตะ layout) ---------- */
  .fx-flash { position:fixed; inset:0; pointer-events:none; z-index:50; opacity:0; }
  .fx-flash.green { background:#4ADE80; animation:fxFade .35s ease-out; }
  .fx-flash.red   { background:#F87171; animation:fxFade .35s ease-out; }
  .fx-flash.gold  { background:#FBBF24; animation:fxFadeStrong .55s ease-out; }
  @keyframes fxFade       { 0% { opacity:.22; } 100% { opacity:0; } }
  @keyframes fxFadeStrong { 0% { opacity:.38; } 100% { opacity:0; } }

  /* กล่องผลลัพธ์เด้งรับ highlight moment (โหมดมั่นใจ) */
  .result.pop { animation:resultPop .45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes resultPop { 0% { transform:scale(.9); } 60% { transform:scale(1.06); } 100% { transform:scale(1); } }

  /* ---------- confetti (transform ล้วน — GPU, ไม่กระตุก) ---------- */
  .confetti {
    position:fixed; top:-16px; width:8px; height:14px; z-index:60;
    pointer-events:none; border-radius:2px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall { to { transform:translateY(112vh) rotate(720deg); } }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>CodeCoin</h1>
    <p>QR SYSTEM — PCB EDITION REV 1.8</p>

  <div class="footer-note">ต้นแบบระบบ QR — เปิดผ่าน ?space=รหัสช่อง</div>
</div>
<button class="mute-btn" id="muteBtn" title="เปิด/ปิดเสียง">🔊</button>

<script>
/* =====================================================================

   โหลด data.json ไม่สำเร็จ เช่น เปิดไฟล์ตรง ๆ แบบ file:// หรือเน็ตล่ม

/* =====================================================================
   ⚙️ ส่วนที่ 2: ตั้งค่าระบบ (แก้ตัวเลขกติกาได้ที่นี่)
   ===================================================================== */
const CONFIG = {
  data_url: "data.json",  // แหล่งข้อมูลจริง — เปลี่ยนเป็น URL Apps Script/opensheet ได้เลย
  log_url: "",            // (optional) URL Apps Script สำหรับเก็บสถิติการตอบ — เว้นว่าง = ไม่เก็บ
  discount_percent: 20,   // ส่วนลดเมื่อตอบถูก (%) — โหมดตอบธรรมดา
  bet_confident: {        // โหมด "มั่นใจ! 🔥" (เดิมพันในหน้าซื้อทรัพย์สิน)
    discount_percent: 40, // ตอบถูก: ส่วนลดเพิ่มเป็น 40% — ตอบผิด: บังคับหมุน fail_roulette
  },
  // วงล้อ "สุ่มผลแก้บั๊ก" สำหรับเลน มั่นใจ! + ตอบผิด เท่านั้น (ธรรมดา+ผิด จ่าย flat เดิม)
  // หลักบาลานซ์: EV ~103-110% (แย่กว่าจ่ายเต็มเล็กน้อย และแย่กว่าตอบถูกมั่นใจ 60% เสมอ)
  // variance กว้างคือตัวสร้างความลุ้น — มีช่องดี (<0.6) ได้แต่ weight ต้องน้อย
  // และถ่วงด้วยช่องหนัก (>1.4) ให้ค่าเฉลี่ยคงอยู่ราว 100-110%

    { label: "🎉 Stack Overflow ช่วยไว้! จ่ายแค่ 40%",        mult: 0.4, weight: 1 },
    { label: "Cache ยังอยู่ ลดให้ 20%",                        mult: 0.8, weight: 2 },
    { label: "จ่ายตามจริง",                                     mult: 1.0, weight: 3 },
    { label: "เซิร์ฟเวอร์คิดเพิ่ม +20%",                        mult: 1.2, weight: 3 },
    { label: "โหลดพีค +40%",                                    mult: 1.4, weight: 2 },
    { label: "💀 Kernel Panic! จ่าย +60%",                     mult: 1.6, weight: 1 },
    { label: "โดน rate limit — จ่ายเต็ม + ข้ามตาถัดไป 1 รอบ",  mult: 1.0, weight: 1, skip: true },
  ],
  zone_names: { coding:"Coding Avenue", design:"Design District", office:"Office Street", hardware:"Hardware Town" },
  zone_colors: { coding:"var(--coding)", design:"var(--design)", office:"var(--office)", hardware:"var(--hardware)" },
  upgrade_names: { 1:"มือใหม่", 2:"ชำนาญ", 3:"ผู้เชี่ยวชาญ" }, // ชื่อระดับ rent[1..3]
  speed_time_limit: 15,   // วินาทีของ event แบบ speed (แข่งตอบเร็ว)
  speed_players: 4,       // จำนวนปุ่มผู้เล่นบนหน้า speed
  bugjam_bonus_hard: 300,        // โบนัสตอบถูกโจทย์ Bug Jam ระดับยาก
  bugjam_bonus_hard_hinted: 150, // โบนัสระดับยากเมื่อกดดู hint แล้ว

// ---------- โหลดข้อมูลจาก data.json → ถ้าพลาดใช้ FALLBACK ----------
async function loadData() {
  let source = FALLBACK, usedFallback = true;
  try {
    const res = await fetch(CONFIG.data_url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const d = await res.json();
    if (d.spaces && d.questions && d.events && d.bugjam) { source = d; usedFallback = false; }
    else throw new Error("โครงสร้างข้อมูลไม่ครบ");
  } catch (e) {
    console.warn("โหลดฐานข้อมูลไม่สำเร็จ ใช้ข้อมูลสำรอง:", e.message);
  }

  SPACES = source.spaces;
  // ข้ามแถวร่าง: question_th ขึ้นต้นด้วย DRAFT
  QUESTIONS = source.questions.filter(q => !String(q.question_th).startsWith("DRAFT"));
  EVENTS = source.events;
  BUGJAM = source.bugjam.filter(b => !String(b.question_th).startsWith("DRAFT"));

  if (usedFallback)
    document.getElementById("dataStatus").innerHTML =
      `<div class="data-warn">⚠️ โหลดฐานข้อมูลไม่สำเร็จ — กำลังใช้ข้อมูลสำรองในเครื่อง</div>`;

  route();
}

/* =====================================================================
   ระบบเสียง (Web Audio ล้วน — ไม่มีไฟล์เสียง/CDN, รันบน GitHub Pages ได้)
   - AudioContext ถูกสร้าง/ปลดล็อกจาก user gesture แรกเท่านั้น (กัน autoplay block)
   - เสียงติ๊กจาก timer จะเงียบไปเองจนกว่าผู้เล่นแตะจอครั้งแรก
   ===================================================================== */
const SFX = (() => {
  let ctx = null, muted = false, warmed = false;
  const AC = window.AudioContext || window.webkitAudioContext;

  // ปลุก AudioContext จาก user gesture — สร้าง + resume + เล่น buffer เงียบให้ฮาร์ดแวร์ตื่น
  // ผูกหลาย event และคอยลองจนกว่าจะ running จริง (มือถือ resume เป็น async ครั้งเดียวมักไม่พอ)
  const UNLOCK_EVENTS = ["pointerdown", "touchstart", "touchend", "click", "keydown"];
  function unlock() {
    try {
      if (!ctx && AC) ctx = new AC();
      if (!ctx) return;
      if (ctx.state !== "running") ctx.resume();
      if (!warmed) {  // silent buffer — เคล็ดปลุกเสียง iOS ให้พร้อมก่อนโน้ตจริง
        const b = ctx.createBuffer(1, 1, 22050);
        const s = ctx.createBufferSource();
        s.buffer = b; s.connect(ctx.destination); s.start(0);
        warmed = true;
      }
      if (ctx.state === "running")  // ปลุกสำเร็จแล้ว เลิกดักฟัง
        UNLOCK_EVENTS.forEach(ev => document.removeEventListener(ev, unlock));
    } catch (e) {}
  }
  UNLOCK_EVENTS.forEach(ev => document.addEventListener(ev, unlock, { passive: true }));

  // เล่นโน้ตเดียว: envelope ขึ้นเร็ว-จางลง กันเสียงคลิกป๊อก
  function tone(freq, dur, { type = "sine", vol = 0.15, when = 0 } = {}) {
    if (muted || !ctx) return;                       // ก่อนแตะจอครั้งแรก — เงียบ (กัน autoplay)
    if (ctx.state !== "running") { try { ctx.resume(); } catch (e) {} }  // เร่งปลุก แล้ว schedule ต่อ
    try {                                            // โน้ตที่ schedule ตอน suspend จะดังเองเมื่อ resume
      const t0 = ctx.currentTime + when;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0); o.stop(t0 + dur + 0.05);
    } catch (e) {}
  }

  return {
    toggleMuted() { muted = !muted; return muted; },
    // นับถอยหลัง — โหมด danger (เหลือ ≤5 วิ) สูงและดังขึ้น
    tick(danger) {
      danger ? tone(1500, 0.07, { type: "square", vol: 0.14 })
             : tone(950, 0.045, { type: "square", vol: 0.05 });
    },
    correct()   { tone(1318.5, 0.14, { vol: 0.16 }); tone(1760, 0.22, { when: 0.09, vol: 0.14 }); },          // ติ๊ง 2 โน้ตสูง
    fanfare()   { [523.25, 659.25, 783.99].forEach((f, i) => tone(f, 0.16, { type: "triangle", when: i * 0.11, vol: 0.2 }));
                  tone(1046.5, 0.4, { type: "triangle", when: 0.33, vol: 0.22 }); },                          // C-E-G-C เรียงขึ้น
    wrong()     { tone(233, 0.22, { vol: 0.09 }); tone(196, 0.3, { when: 0.12, vol: 0.07 }); },               // โทนต่ำ นุ่ม
    buzzer()    { tone(155, 0.35, { type: "sawtooth", vol: 0.11 }); tone(110, 0.3, { when: 0.05, type: "sawtooth", vol: 0.08 }); },
    celebrate() { [659.25, 783.99, 987.77, 1318.5].forEach((f, i) => tone(f, 0.15, { type: "triangle", when: i * 0.09, vol: 0.2 }));
                  tone(1567.98, 0.45, { type: "triangle", when: 0.38, vol: 0.2 }); },
  };
})();

/* ---------- visual feedback (fixed overlay + transform ล้วน ไม่หน่วง timer) ---------- */
function flash(color) {
  const el = document.createElement("div");
  el.className = "fx-flash " + color;
  el.addEventListener("animationend", () => el.remove());
  document.body.appendChild(el);
}

function confetti() {
  const colors = ["#FBBF24", "#4ADE80", "#FB923C", "#38BDF8", "#F472B6", "#FFFFFF"];
  for (let i = 0; i < 44; i++) {
    const p = document.createElement("div");
    p.className = "confetti";
    p.style.left = Math.random() * 100 + "vw";
    p.style.background = colors[i % colors.length];
    p.style.transform = `rotate(${Math.random() * 360}deg)`;
    p.style.animationDuration = 1.6 + Math.random() * 1.3 + "s";
    p.style.animationDelay = Math.random() * 0.35 + "s";
    p.addEventListener("animationend", () => p.remove());
    document.body.appendChild(p);
  }
}

function zoneTag(zone) {
  return `<span class="zone-tag" style="background:${CONFIG.zone_colors[zone]}">${CONFIG.zone_names[zone]}</span>`;
}

// แปลรหัส effect เป็นข้อความภาษาไทย
function effectText(effect) {
  if (effect.startsWith("+")) return `รับ ${(+effect.slice(1)).toLocaleString()} TechCoin 🎉`;
  if (effect.startsWith("-")) return `จ่าย ${(+effect.slice(1)).toLocaleString()} TechCoin 💸`;
  if (effect.startsWith("skip")) return `ข้าม ${effect.split(":")[1]} เทิร์น ⏸`;
  if (effect.startsWith("all")) return `ผู้เล่นคนอื่นทุกคนจ่าย ${(+effect.split(":")[1].replace("-","")).toLocaleString()} TechCoin ยกเว้นคุณ!`;
  if (effect.startsWith("collect")) return `เก็บจากผู้เล่นทุกคน คนละ ${(+effect.split(":")[1]).toLocaleString()} TechCoin`;
  return effect;
}

// สุ่มแบบมีน้ำหนัก (weighted random)
function weightedPick(list) {
  const total = list.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of list) { r -= e.weight; if (r <= 0) return e; }
  return list[list.length - 1];
}

// ---------- หน้าช่องทรัพย์สิน ----------
function renderSpace(id) {
  const sp = SPACES[id];
  const pool = QUESTIONS.filter(q => q.space_id === id && q.level === 1);
  const conf = CONFIG.bet_confident;

  // ราคาที่ต้องจ่ายเมื่อรู้ยอดแน่นอน (ตอบถูกทั้งสองโหมด / ธรรมดา+ผิด = ราคาเต็ม)
  // เลน มั่นใจ!+ผิด ไม่ผ่านฟังก์ชันนี้ — ยอดมาจากวงล้อ fail_roulette
  const payPrice = (mode, ok) => {
    const pct = ok ? -(mode === "confident" ? conf.discount_percent : CONFIG.discount_percent) : 0;
    return Math.round(sp.price * (100 + pct) / 100);
  };

  const upgradeBtns = `
    <div class="card">
      <p class="q">⬆ อัปเกรดช่องนี้ (สำหรับเจ้าของ)</p>
      <div class="upgrade-links">
        <button class="btn ghost" onclick="location.search='?space=${id}&upgrade=2'">ชำนาญ (L2)</button>
        <button class="btn ghost" onclick="location.search='?space=${id}&upgrade=3'">ผู้เชี่ยวชาญ (L3)</button>
      </div>
    </div>`;

  let quizCard;
  if (pool.length) {
    quizCard = `
      <div class="card">
        <div class="bet-row">
          <button class="bet-btn active" id="betNormal">ตอบธรรมดา
            <small>ถูก ลด ${CONFIG.discount_percent}% · ผิด ราคาเต็ม</small></button>
          <button class="bet-btn" id="betConfident">มั่นใจ! 🔥
            <small>ถูก ลด ${conf.discount_percent}% · ผิด สุ่มผลแก้บั๊ก 🎰</small></button>
        </div>
        <div id="timerBox"></div>
        <p class="q" id="qText"></p>
        <div id="choices"></div>
        <div id="result"></div>
      </div>`;
  } else {
    quizCard = `<div class="card"><div class="result info">ยังไม่มีคำถามสำหรับช่องนี้ — ซื้อได้ในราคาเต็ม</div></div>`;
  }

  screen.innerHTML = `
    <div class="card">
      ${zoneTag(sp.zone)}
      <h2>${sp.name_th}</h2>
      <p class="content" id="spContent"></p>
      <p style="margin-top:10px;font-size:14px;">ราคา: <span class="price">${sp.price.toLocaleString()} TechCoin</span></p>
    </div>
    ${quizCard}
    ${upgradeBtns}`;

  // เนื้อหาอาจมีแท็ก HTML เป็นตัวอย่างในบทเรียน (เช่น <h1>) — ต้องใส่แบบ text ล้วน
  document.getElementById("spContent").textContent =
    sp.content_th.startsWith("📘") ? sp.content_th : "📘 " + sp.content_th;

  if (!pool.length) return;
  const q = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("qText").textContent = "Q: " + q.question_th;

  // โหมดเดิมพัน — สลับได้จนกว่าจะตอบ (หรือหมดเวลา)
  let betMode = "normal";
  const betBtns = { normal: document.getElementById("betNormal"), confident: document.getElementById("betConfident") };
  for (const [mode, btn] of Object.entries(betBtns))
    btn.onclick = () => {
      betMode = mode;
      betBtns.normal.classList.toggle("active", mode === "normal");
      betBtns.confident.classList.toggle("active", mode === "confident");
    };

  renderQuiz(q, (ok, timedOut) => {
    Object.values(betBtns).forEach(b => b.disabled = true);
    logAnswer(betMode === "confident" ? "buy_confident" : "buy", id, 1, ok);

    // เสียง+เอฟเฟกต์ตอนรู้ผล (กรณีหมดเวลา renderQuiz เล่น buzzer+แฟลชแดงให้แล้ว)
    if (ok && betMode === "confident") { SFX.fanfare(); flash("gold"); }
    else if (ok) { SFX.correct(); flash("green"); }
    else if (!timedOut) { SFX.wrong(); flash("red"); }

    // เลน มั่นใจ!+ผิด — ไม่รู้ยอดทันที ต้องหมุนวงล้อสุ่มผลแก้บั๊ก
    if (!ok && betMode === "confident") {
      document.getElementById("result").innerHTML = `
        <div class="result lose">💥 มั่นใจแต่พลาด — ระบบพัง! ต้องสุ่มผลแก้บั๊ก</div>
        <button class="btn" id="spinBtn">🎰 หมุนแก้บั๊ก</button>
        <div id="rouletteBox"></div>`;
      document.getElementById("spinBtn").onclick = () => spinFailRoulette(sp, id);
      return;
    }

    const pay = payPrice(betMode, ok).toLocaleString();
    let msg;
    if (ok) msg = betMode === "confident"
      ? `<div class="result win pop">🔥🎉 มั่นใจแล้วถูกจริง! ซื้อได้ในราคา <b>${pay}</b> (ลด ${conf.discount_percent}%)</div>`
      : `<div class="result win">🎉 ตอบถูก! ซื้อได้ในราคา <b>${pay}</b> (ลด ${CONFIG.discount_percent}%)</div>`;
    else msg = `<div class="result lose">ตอบผิด — ซื้อได้ในราคาเต็ม ${sp.price.toLocaleString()} TechCoin</div>`;
    document.getElementById("result").innerHTML = msg;
  });
}

// ---------- วงล้อสุ่มผลแก้บั๊ก (เฉพาะเลน มั่นใจ! + ตอบผิด) ----------
// สุ่มผลด้วย weightedPick ตัวเดียวกับ event card / เสียงหมุนใช้ SFX.tick เดิม
function spinFailRoulette(sp, spaceId) {
  const btn = document.getElementById("spinBtn");
  btn.disabled = true;
  const box = document.getElementById("rouletteBox");
  const pool = CONFIG.fail_roulette;
  const final = weightedPick(pool);   // ผลจริงถูกล็อกก่อน แอนิเมชันแค่โชว์

  const showFrame = (text, cls = "") => {
    box.innerHTML = `<div class="roulette-frame ${cls}" id="rouletteFrame"></div>`;
    document.getElementById("rouletteFrame").textContent = text;
    return document.getElementById("rouletteFrame");
  };

  let delay = 60;
  (function step() {
    delay *= 1.15;                    // หน่วงขึ้นเรื่อย ๆ เหมือนวงล้อผ่อนแรง (~1.7 วิ)
    if (delay < 320) {
      showFrame(pool[Math.floor(Math.random() * pool.length)].label);
      SFX.tick(false);
      setTimeout(step, delay);
      return;
    }
    // เด้งผลจริง
    const pay = Math.round(sp.price * final.mult);
    const frame = showFrame("", "final");
    frame.innerHTML = `
      <div id="rouletteLabel" style="font-size:17px;"></div>
      <div class="price" style="font-size:21px; margin-top:6px;">จ่าย ${pay.toLocaleString()} TechCoin</div>
      ${final.skip ? `<div style="color:var(--bad); font-weight:700; margin-top:6px;">⏸ และผู้เล่นคนนี้ต้องข้ามตาถัดไป 1 รอบ</div>` : ""}`;
    document.getElementById("rouletteLabel").textContent = final.label;

    if (final.mult < 1)      { SFX.correct(); flash("green"); }   // รอดถูกกว่าราคาเต็ม
    else if (final.mult > 1 || final.skip) { SFX.wrong(); flash("red"); }
    logAnswer("fail_roulette", spaceId, 1, false, { roulette_label: final.label, pay });
  })();
}

  const pool = QUESTIONS.filter(q => q.space_id === id && q.level === level);
  const infoCard = `

    </div>`;

  if (!pool.length) {
    screen.innerHTML = infoCard + `
      <div class="card">
        <div class="result info">ยังไม่มีคำถามระดับ ${name} (L${level}) สำหรับช่องนี้ในคลัง</div>
        <button class="btn" onclick="location.search='?space=${id}'">กลับหน้าช่อง</button>
      </div>`;
    return;
  }

  const q = pool[Math.floor(Math.random() * pool.length)];
  screen.innerHTML = infoCard + `
    <div class="card">
      <div id="timerBox"></div>
      <p class="q" id="qText"></p>
      <div id="choices"></div>
      <div id="result"></div>
      <button class="btn ghost" onclick="location.search='?space=${id}'">กลับหน้าช่อง</button>
    </div>`;
  document.getElementById("qText").textContent = "Q: " + q.question_th;

  renderQuiz(q, (ok, timedOut) => {
    logAnswer("upgrade", id, level, ok);
    document.getElementById("result").innerHTML = ok
      ? `<div class="result win pop">🎉 ตอบถูก! จ่าย <b>${sp.upgrade_cost.toLocaleString()}</b> เพื่ออัปเกรดเป็น "${name}" — ค่าเช่าใหม่ <b>${sp.rent[level].toLocaleString()}</b> TechCoin</div>`
      : `<div class="result lose">ตอบผิด — อัปเกรดไม่สำเร็จ ลองใหม่ได้ในเทิร์นถัดไป</div>`;

    if (ok) { SFX.celebrate(); confetti(); }         // อัปเกรดสำเร็จ = highlight moment
    else if (!timedOut) { SFX.wrong(); flash("red"); }
  });
}

// ---------- หน้าช่องเหตุการณ์ ----------
function renderEvent(zone) {
  const ev = weightedPick(EVENTS.filter(e => e.zone === zone));

  if (ev.mechanic === "speed") { renderSpeedEvent(ev, zone); return; }

  let body = "";

  if (ev.mechanic === "choice") {
    const [bet, safe] = ev.effect.split("|");
    const [, amount, mult] = bet.split(":");
    body = `
      <button class="choice" id="betBtn">🎲 เดิมพัน ${(+amount).toLocaleString()} — ลุ้นรับ ${mult}</button>
      <button class="choice" id="safeBtn">✅ ${effectText(safe.split(":")[1] ?? safe.replace("safe:",""))}</button>
      <div id="result"></div>`;
  } else {
    body = `<div class="result info">${effectText(ev.effect)}</div>`;
  }

  screen.innerHTML = `
    <div class="card">
      ${zoneTag(zone)}
      <h2>🎰 ${ev.title_th}</h2>
      ${ev.description_th ? `<p class="content" id="evDesc" style="margin-bottom:10px;"></p>` : ""}
      ${body}

    document.getElementById("betBtn").onclick = () => {

      document.getElementById("result").innerHTML = win
        ? `<div class="result win">🎉 ชนะเดิมพัน! รับ ${(amount * parseInt(mult.slice(1))).toLocaleString()} TechCoin</div>`
        : `<div class="result lose">แพ้เดิมพัน เสีย ${(+amount).toLocaleString()} TechCoin</div>`;

}

// ไม่ใช่ multiplayer จริง — ทุกคนดูจอเดียวกัน แข่งตอบปากเปล่า แล้วคนถือมือถือ
// กดหมายเลขผู้เล่นที่วงตัดสินว่าตอบถูกไวสุด (state อยู่ในฟังก์ชันนี้ ใช้ครั้งเดียวจบ)
function renderSpeedEvent(ev, zone) {
  const q = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];

  screen.innerHTML = `
    <div class="card">
      ${zoneTag(zone)}
      <h2>⚡ ${ev.title_th}</h2>

    </div>`;

  if (ev.description_th) document.getElementById("evDesc").textContent = ev.description_th;
  // คำถาม/ตัวเลือกอาจมีแท็ก HTML เป็นตัวอย่างบทเรียน — ใส่แบบ text ล้วนเสมอ
  document.getElementById("qText").textContent = "Q: " + q.question_th;
  const box = document.getElementById("choices");
  q.choices.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.disabled = true;  // โชว์ให้อ่านอย่างเดียว — ไม่มีการกดตอบบนจอ
    b.textContent = String.fromCharCode(65 + i) + ". " + c;
    box.appendChild(b);
  });

  const wrap = document.getElementById("speedPlayers");
  let timer = null;

  // กลับเมนูโดยไม่ reload หน้า — ต้องหยุด timer ก่อน ไม่งั้นเสียงติ๊ก/บัซเซอร์ตามไปหน้าเมนู
  document.getElementById("speedBack").onclick = () => { clearInterval(timer); renderMenu(); };

  // จบรอบ: winner = เลขผู้เล่น หรือ null = หมดเวลา (กดย้อนหลังไม่ได้ — ปุ่มถูก disable)
  const finish = winner => {
    clearInterval(timer);
    [...wrap.children].forEach(b => b.disabled = true);
    box.children[q.answer].classList.add("correct");  // เฉลยให้วงเห็น
    if (winner) {
      SFX.correct(); flash("green");
      logAnswer("speed", ev.event_id || "event_" + zone, 0, true);
      document.getElementById("result").innerHTML =
        `<div class="result win">⚡ ผู้เล่น ${winner} ตอบไวสุด! ${effectText(ev.effect)}</div>`;
    } else {
      document.getElementById("result").innerHTML =
        `<div class="result lose">⏱ หมดเวลา — รอบนี้ไม่มีใครได้รางวัล</div>`;
    }
  };

  for (let p = 1; p <= CONFIG.speed_players; p++) {
    const b = document.createElement("button");
    b.className = "speed-player";
    b.textContent = "ผู้เล่น " + p;
    b.onclick = () => finish(p);
    wrap.appendChild(b);
  }

  // timer แบบเดียวกับ renderQuiz (ติ๊กเร่งเมื่อเหลือ ≤5 วิ, หมดเวลา = buzzer + แฟลชแดง)
  let t = CONFIG.speed_time_limit;
  const tb = document.getElementById("timerBox");
  tb.innerHTML = `<div class="timer">⏱ ${t} วินาที</div>`;
  timer = setInterval(() => {
    t--;
    tb.innerHTML = `<div class="timer ${t <= 5 ? "danger" : ""}">⏱ ${t} วินาที</div>`;
    if (t <= 0) {
      SFX.buzzer();
      flash("red");
      finish(null);
    } else {
      SFX.tick(t <= 5);
    }
  }, 1000);
}

// ---------- ระบบควิซ + จับเวลา (ใช้ร่วมกันทุกหน้า) ----------
// onDone(ok, timedOut) — timedOut = true เฉพาะกรณีหมดเวลา (เสียง buzzer + แฟลชแดง
// เล่นจากในนี้แล้ว ผู้เรียกจัดการเฉพาะเสียง/เอฟเฟกต์ของการคลิกตอบ)
function renderQuiz(q, onDone, timeout_fail) {
  const box = document.getElementById("choices");
  let timer = null;

  q.choices.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "choice";
    b.textContent = String.fromCharCode(65 + i) + ". " + c;
    b.onclick = () => {
      clearInterval(timer);
      [...box.children].forEach((el, j) => {
        el.disabled = true;
        if (j === q.answer) el.classList.add("correct");
        else if (j === i) el.classList.add("wrong");
      });
      onDone(i === q.answer, false);
    };
    box.appendChild(b);
  });

  if (q.time_limit > 0) {
    let t = q.time_limit;
    const tb = document.getElementById("timerBox");
    tb.innerHTML = `<div class="timer">⏱ ${t} วินาที</div>`;
    timer = setInterval(() => {
      t--;
      tb.innerHTML = `<div class="timer ${t <= 5 ? "danger" : ""}">⏱ ${t} วินาที</div>`;
      if (t <= 0) {
        clearInterval(timer);
        [...box.children].forEach(el => el.disabled = true);
        SFX.buzzer();
        flash("red");
        onDone(false, true);
      } else {
        SFX.tick(t <= 5);
      }
    }, 1000);
  }
}

/* =====================================================================
   มินิเกม "กู้บั๊กด่วน" (Debug Rescue) — 2 คน 2 มือถือ
   ---------------------------------------------------------------------
   ไม่มี backend: ทั้งคู่พิมพ์ "รหัสร่วม 4 ตัว" เดียวกัน → seed → derive
   ปริศนา+กฎชุดเดียวกันแบบ deterministic (solver ตรวจผลเองได้)
   ===================================================================== */

// PRNG แบบ deterministic จาก string seed (mulberry32) — ต้องได้ผลเดิมทุกเครื่อง
// หมายเหตุ: weightedPick เดิมใช้ Math.random (สุ่มสด) จึงใช้ที่นี่ไม่ได้ เพราะ 2 เครื่องต้องตรงกัน
function seededRng(str) {
  let h = 1779033703 ^ str.length;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  let a = h >>> 0;
  return () => {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rngInt = (rng, lo, hi) => lo + Math.floor(rng() * (hi - lo + 1)); // รวม hi

// เช็คว่า layout นี้ "กฎ apply ได้จริง" — กัน edge case ที่ guide อ่านกฎแล้วหาเส้นไม่เจอ
// (เช่น v1 มีเหลืองแต่ไม่มีน้ำเงิน, v4 มีเส้นเข้าเงื่อนไขไม่ถึง 2)
function wireRuleClean(colors, vid) {
  if (vid === "v1") return !colors.includes("yellow") || colors.includes("blue");
  if (vid === "v3") {
    const hasDup = colors.some((c, i) => colors.indexOf(c) !== i);
    return hasDup || colors.includes("green");
  }
  if (vid === "v4") return colors.filter(c => c !== "red" && c !== "green").length >= 2;
  return true; // v2 แก้ได้เสมอ
}

// สร้างสถานะ wire_cut จาก seed — ทั้ง solver/guide เรียกโค้ดเดียวกัน = ผลตรงกันเป๊ะ
function buildWireCut(rng) {
  const P = CONFIG.debug_rescue.patterns.find(p => p.id === "wire_cut");
  const n = rngInt(rng, P.wire_count_range[0], P.wire_count_range[1]);
  let variant = P.rule_variants[rngInt(rng, 0, P.rule_variants.length - 1)];
  let colors;
  // ดึงสีใหม่จนกฎ apply ได้จริง (rng เดินเหมือนกันทั้ง 2 เครื่อง จึงยัง deterministic)
  for (let tries = 0; tries < 24; tries++) {
    colors = Array.from({ length: n }, () => P.wire_colors[rngInt(rng, 0, P.wire_colors.length - 1)]);
    if (wireRuleClean(colors, variant.id)) break;
    if (tries === 23) variant = P.rule_variants[1]; // v2 แก้ได้เสมอ — กันลูปไม่จบ
  }
  return { colors, variant, answer: wireAnswer(colors, variant.id) };
}

// คำนวณลำดับเส้นที่ต้องตัด (index) ตามกฎแต่ละเวอร์ชัน — fallback ให้แก้ได้เสมอ
function wireAnswer(colors, vid) {
  const firstOf = c => colors.indexOf(c);
  if (vid === "v1") {
    if (colors.includes("yellow")) { const b = firstOf("blue"); return [b >= 0 ? b : 0]; }
    return [0];
  }
  if (vid === "v2") {
    const reds = colors.filter(c => c === "red").length;
    return [reds % 2 === 0 ? colors.length - 1 : Math.max(0, colors.length - 2)];
  }
  if (vid === "v3") {
    const dupColor = colors.find((c, i) => colors.indexOf(c) !== i && colors.indexOf(c) === colors.lastIndexOf(c) - (colors.filter(x => x === c).length - 1))
      || colors.find(c => colors.filter(x => x === c).length >= 2);
    if (dupColor) return [colors.indexOf(dupColor)];
    const g = firstOf("green"); return [g >= 0 ? g : 0];
  }
  if (vid === "v4") {
    const idxs = colors.map((c, i) => ({ c, i })).filter(o => o.c !== "red" && o.c !== "green").map(o => o.i);
    return idxs.length ? idxs.slice(0, 2) : [0];
  }
  return [0];
}

      <p class="content" style="margin-top:8px;">1. ตกลงรหัสร่วมกัน 1 ชุด (ทั้งคู่ต้องพิมพ์เหมือนกัน) · 2. แยกกันเลือกบทบาท · 3. กด "เริ่ม" พร้อมกัน</p>
      <input class="rescue-input" id="rescueCode" maxlength="4" value="${code0}" autocomplete="off">
      <p class="content" style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:10px;">รหัสสุ่มให้แล้ว — บอกเพื่อนให้พิมพ์รหัสนี้ หรือพิมพ์รหัสที่ตกลงกันเอง</p>
      <p class="q">เครื่องนี้เป็น:</p>
      <div class="role-pick">
        <button class="btn" id="asSolver">🖥 ผู้กด (เห็นปริศนา)</button>
        <button class="btn ghost" id="asGuide">📖 ผู้อ่านคู่มือ (เห็นกฎ)</button>
      </div>
    </div>`;
  const go = role => {
    const code = document.getElementById("rescueCode").value.trim().toUpperCase();
    if (code.length < 3) { document.getElementById("rescueCode").focus(); return; }
    location.search = `?space=debug_rescue&role=${role}&code=${code}`;
  };
  document.getElementById("asSolver").onclick = () => go("solver");
  document.getElementById("asGuide").onclick = () => go("guide");
}

// timer ร่วม (เริ่มนับเมื่อกด "เริ่ม" บนเครื่องตัวเอง — ไม่ sync เป๊ะข้ามเครื่อง ตามสเปค)
// onEnd(false) เมื่อหมดเวลา, คืนฟังก์ชัน stop ให้หยุดเมื่อชนะ/ออกจากหน้า
function rescueTimer(seconds, boxId, onEnd) {
  let t = seconds;
  const tb = document.getElementById(boxId);
  const paint = () => tb.innerHTML = `<div class="timer ${t <= 5 ? "danger" : ""}">⏱ ${t} วินาที</div>`;
  paint();
  const iv = setInterval(() => {
    t--; paint();
    if (t <= 0) { clearInterval(iv); SFX.buzzer(); flash("red"); onEnd(false); }
    else SFX.tick(t <= 5);
  }, 1000);
  return {
    stop: () => clearInterval(iv),
    cut: pct => { t = Math.max(1, Math.round(t * (1 - pct))); paint(); }, // ตัดเวลาเมื่อขอ hint
  };
}

// หน้า solver (ผู้กด) — เห็นปริศนา ตรวจผลเอง
function renderRescueSolver(code) {
  const P = CONFIG.debug_rescue.patterns.find(p => p.id === "wire_cut");
  const state = buildWireCut(seededRng(code));
  let step = 0, done = false, timer = null, hinted = false;

  screen.innerHTML = `
    <div class="card">
      <span class="zone-tag" style="background:var(--bad)">🖥 ผู้กด · รหัส ${code}</span>
      <h2>${P.name} — ตัดให้ถูก!</h2>
      <p class="content">ฟังผู้อ่านคู่มือบอก แล้วกด "ตัด" ตามลำดับ</p>
      <div id="rTimer"></div>
      <div id="wires" style="margin:12px 0;"></div>
      <button class="btn ghost" id="rHint">💡 ขอ hint (เสียเวลา ${Math.round(CONFIG.debug_rescue.hint_time_cut*100)}%)</button>
      <div id="rHintBox"></div>
      <div id="rResult"></div>
    </div>`;

  const wrap = document.getElementById("wires");
  state.colors.forEach((c, i) => {
    const row = document.createElement("div");
    row.className = "wire-row";
    row.innerHTML = `<span class="wire-idx">${i + 1}</span>
      <div class="wire-bar" style="background:${WIRE_HEX[c]}"></div>
      <button class="wire-cut-btn">✂ ตัด</button>`;
    row.querySelector("button").onclick = () => cut(i, row);
    wrap.appendChild(row);
  });

  const finish = ok => {
    if (done) return;
    done = true; timer.stop();
    wrap.querySelectorAll("button").forEach(b => b.disabled = true);
    document.getElementById("rHint").disabled = true;
    const r = CONFIG.debug_rescue.reward, pen = CONFIG.debug_rescue.penalty;
    if (ok) { SFX.celebrate(); confetti();
      document.getElementById("rResult").innerHTML = `<div class="result win pop">🎉 กู้ระบบสำเร็จ! ทั้งคู่รับ ${r.toLocaleString()} TechCoin</div>`;
    } else { SFX.wrong(); flash("red");
      document.getElementById("rResult").innerHTML = `<div class="result lose">💀 ระบบล่ม — ทั้งคู่เสีย ${pen.toLocaleString()} TechCoin</div>`;
    }
    logAnswer("debug_rescue", "debug_rescue", 0, ok, { pattern: "wire_cut", variant: state.variant.id, hinted });
    const back = document.createElement("button");
    back.className = "btn"; back.textContent = "กลับเมนู";
    back.onclick = renderMenu; document.getElementById("rResult").appendChild(back);
  };

  function cut(i, row) {
    if (done || row.classList.contains("cut")) return;
    row.classList.add("cut");
    row.querySelector("button").disabled = true;
    if (i === state.answer[step]) { SFX.correct(); step++; if (step >= state.answer.length) finish(true); }
    else finish(false);  // ตัดผิดเส้น = ล่มทันที
  }

  document.getElementById("rHint").onclick = () => {
    hinted = true;
    document.getElementById("rHint").disabled = true;
    timer.cut(CONFIG.debug_rescue.hint_time_cut);
    document.getElementById("rHintBox").innerHTML =
      `<div class="result info" style="margin-top:8px;">💡 กฎรอบนี้: ${state.variant.guide_text}</div>`;
  };

  timer = rescueTimer(P.time_limit, "rTimer", finish);
}

// หน้า guide (ผู้อ่านคู่มือ) — เห็นเฉพาะกฎ ไม่เห็นปริศนา
function renderRescueGuide(code) {
  const P = CONFIG.debug_rescue.patterns.find(p => p.id === "wire_cut");
  const state = buildWireCut(seededRng(code));  // seed เดียวกัน → กฎตรงกับ solver
  screen.innerHTML = `
    <div class="card">
      <span class="zone-tag" style="background:var(--gold);color:#05100C">📖 ผู้อ่านคู่มือ · รหัส ${code}</span>
      <h2>${P.name} — คู่มือ</h2>
      <p class="content">อ่านกฎให้ผู้กดฟัง ถามสีเส้นที่เขาเห็น แล้วบอกว่าให้ตัดเส้นไหน (ห้ามดูจอผู้กด!)</p>
      <div id="rTimer"></div>
      <div class="rescue-guide" style="margin-top:10px;">📋 กฎ: ${state.variant.guide_text}</div>
      <button class="btn" style="margin-top:14px;" onclick="renderMenu()">กลับเมนู</button>
    </div>`;
  rescueTimer(P.time_limit, "rTimer", () => {
    document.getElementById("rTimer").innerHTML = `<div class="result lose">⏱ หมดเวลา</div>`;
  });
}

function renderDebugRescue() {
  const role = params.get("role"), code = params.get("code");
  if (!role || !code) { renderRescueLanding(); return; }
  role === "guide" ? renderRescueGuide(code) : renderRescueSolver(code);
}

// ---------- ROUTER: อ่าน ?space= (+ &upgrade= / &role= &code=) แล้วเลือกหน้า ----------
function route() {
  if (!param) renderMenu();
  else if (param === "bugjam") renderBugjam();
  else if (param === "debug_rescue") renderDebugRescue();
  else if (param.startsWith("event_")) renderEvent(param.replace("event_", ""));
  else if (SPACES[param]) upgradeParam ? renderUpgrade(param, +upgradeParam) : renderSpace(param);
  else screen.innerHTML = `<div class="card"><h2>ไม่พบรหัสช่อง "${param}"</h2><button class="btn" onclick="renderMenu()">กลับเมนู</button></div>`;
}

loadData();
</script>
